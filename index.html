<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Navigation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="header">
    <div class="header-inner">
        <span class="logo">HOME</span>
        <div class="header-controls">
            <button id="langBtn" aria-label="言語切り替え">EN</button>
            <button id="themeBtn" aria-label="モード切替">🌙</button>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1 data-i18n="hero_title">ようこそ</h1>
        <p data-i18n="hero_sub">ここからすべてが始まる</p>
        <div class="hero-nav">
            <a href="#about" class="hero-nav-btn" data-i18n="nav_about">この場所</a>
            <a href="#gallery" class="hero-nav-btn" data-i18n="nav_gallery">ギャラリー</a>
            <a href="#links" class="hero-nav-btn" data-i18n="nav_links">リンク</a>
            <a href="#tools" class="hero-nav-btn" data-i18n="nav_tools">ツール</a>
        </div>
    </div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
</section>

<main class="container">

    <section class="room" id="about">
        <div class="room-header">
            <h2 data-i18n="room1_title">この場所について</h2>
            <span class="room-icon">🏠</span>
        </div>
        <div class="room-body">
            <p data-i18n="room1_body">ここは案内のためのホームページ。気になる場所をクリックして、好きなところから探検を始めよう。</p>
        </div>
    </section>

    <section class="room" id="gallery">
        <div class="room-header">
            <h2 data-i18n="room2_title">ギャラリー</h2>
            <span class="room-icon">🎨</span>
        </div>
        <div class="room-body">
            <div class="gallery-grid">
                <div class="gallery-item">✨</div>
                <div class="gallery-item">🚀</div>
                <div class="gallery-item">🌈</div>
                <div class="gallery-item">🎵</div>
            </div>
        </div>
    </section>

    <section class="room" id="links">
        <div class="room-header">
            <h2 data-i18n="room3_title">リンク集</h2>
            <span class="room-icon">🔗</span>
        </div>
        <div class="room-body">
            <div class="links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="https://discord.com" target="_blank" rel="noopener">Discord</a>
                <a href="https://twitter.com" target="_blank" rel="noopener">X (Twitter)</a>
                <a href="https://youtube.com" target="_blank" rel="noopener">YouTube</a>
            </div>
        </div>
    </section>

    <section class="room" id="tools">
        <div class="room-header">
            <h2 data-i18n="room4_title">ツール</h2>
            <span class="room-icon">🛠️</span>
        </div>
        <div class="room-body">
            <div class="tool-buttons">
                <button class="tool-btn" data-tool="counter">カウンター</button>
                <button class="tool-btn" data-tool="random">ランダム</button>
            </div>
            <div class="tool-output" id="tool-output"></div>
        </div>
    </section>

</main>

<footer>
    <p>© 2025 Home Navigation</p>
</footer>

<div class="top-ball">↑</div>

<script src="js/main.js"></script>
</body>
</html>
