<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">GitHub Pages Repo Finder</title>
    <link rel="stylesheet" href="css/style3.css">
</head>
<body>

    <!-- ヘッダー（常時表示） -->
    <header id="header">
        <div class="header-inner">
            <!-- ★ ロゴ・タイトルをクリック可能なリンクに変更 -->
            <a href="index.html" class="header-logo-link">
                <svg class="header-avatar" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <span class="header-title" data-i18n="header_title">Repo Finder</span>
            </a>
            <div class="header-controls">
                <button id="langBtn" aria-label="言語切替">EN</button>
                <button id="themeBtn" aria-label="テーマ切替">☀️</button>
            </div>
        </div>
    </header>

    <!-- 左上API情報バー -->
    <div class="top-info-bar" id="topInfoBar">
        <span class="top-info-time" id="topInfoTime">--:--:--</span>
        <span class="top-info-api" id="topInfoApi">API: --/-- (--:--)</span>
    </div>

    <!-- トップへ戻るボタン -->
    <div class="top-ball" id="topBall" aria-label="トップへ戻る" title="トップへ戻る">↑</div>

    <div class="container">
        <div class="header">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </div>
            <h1 data-i18n="main_title">GitHub Pages Repo Finder</h1>
            <p class="subtitle" data-i18n="main_subtitle">GitHub PagesのURLから元リポジトリを特定</p>
        </div>

        <div class="card">
            <div class="card-header" data-i18n="input_label">🔍 URLを入力</div>
            <div class="input-group">
                <input type="url" id="urlInput" data-i18n-placeholder="input_placeholder" placeholder="https://username.github.io または独自ドメイン" autocomplete="off" spellcheck="false">
                <button class="btn btn-primary" id="searchBtn" data-i18n="search_btn">検索</button>
            </div>
        </div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p class="loading-text" id="loadingText" data-i18n="loading_default">解析中...</p>
            <p class="loading-detail" id="loadingDetail"></p>
        </div>

        <div class="error-box" id="errorBox">
            <div class="error-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15" stroke="white" stroke-width="2"/><line x1="9" y1="9" x2="15" y2="15" stroke="white" stroke-width="2"/></svg>
                <span id="errorTitle" data-i18n="error_default">エラー</span>
            </div>
            <p class="error-detail" id="errorDetail"></p>
        </div>

        <div class="info-box" id="infoBox">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12" stroke="white" stroke-width="2"/><circle cx="12" cy="8" r="1" fill="white"/></svg>
            <span id="infoText"></span>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="footer">
        <span data-i18n="footer_text">GitHub API使用 · 認証なしは<strong>60リクエスト/時</strong>の制限あり</span> ·
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </div>

    <script src="js/main3.js"></script>
</body>
</html>
