name: Generate Dashboard SVG

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日0時（UTC）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (if any)
        run: npm install || true   # 今は不要だがエラー回避

      - name: Run script
        env:
          PAT: ${{ secrets.PAT }}   # シークレットを環境変数に
        run: node js/generate-dashboard.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update dashboard SVG" && git push)